name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [client, author]
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: '${{ matrix.app }}/package-lock.json'
      
      - name: Install dependencies (${{ matrix.app }})
        run: npm ci
        working-directory: ${{ matrix.app }}
      
      - name: Check syntax (${{ matrix.app }})
        run: npm run check
        working-directory: ${{ matrix.app }}
      
      - name: Build Docker image (${{ matrix.app }})
        run: docker build -t sob-${{ matrix.app }}:test .
        working-directory: ${{ matrix.app }}
